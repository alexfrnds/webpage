baseURL: 'https://mywebsite.com/'
languageCode: 'en-us'
title: 'Alex Fernandes'
theme: 'terminal'
timeZone: "Europe/Paris"
menus:
  main:
    - identifier: about
      name: About me
      url: /about.html
      weight: 20
    - identifier: publications
      name: Publications
      url: /publications.html
      weight: 30
    - identifier: teaching
      name: Teaching
      url: /teaching.html
      weight: 40
    - identifier: legal_notice
      name: Legal Notice
      url: /legalnotice.html
      weight: 50
paginate: 10
markup:
  defaultMarkdownHandler: "goldmark"
  goldmark:
    # Enable or disable smartypants (automatic conversion of ASCII punctuation to smart punctuation)
    smartypants: true
    # Enable or disable fractions (automatic conversion of fractions)
    fractions: true
    # Enable or disable superscript and subscript support
    # (enable to allow ^ and ~ for superscript and subscript)
    superscript: true
    unsafe: true
ignoreFiles:
  - "themes/terminal/content"
outputs: 
   home:
     - HTML
     - RSS
     #- sitemap.xml

params:
  social:
    - name: github
      url: https://github.com/alexfrnds
    - name: x
      url: https://twitter.com/AlexBoFer
    - name: linkedin
      url: https://fr.linkedin.com/in/a-frnds/ 

module:
  hugoVersion:
    extended: false
    min: "0.116.0"


